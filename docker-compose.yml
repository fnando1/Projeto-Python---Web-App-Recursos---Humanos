version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres_rh
    environment:
      POSTGRES_DB: rh_system
      POSTGRES_USER: rh_user
      POSTGRES_PASSWORD: senha_segura_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rh_user -d rh_system"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
